<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTune - Share Your Mood Journey!</title>
    <style>
        :root { --primary: #6C63FF; --secondary: #FF6B6B; }
        body { font-family: 'Segoe UI', system-ui; margin: 0; background: #fafafa; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .mood-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            animation: slideUp 0.3s ease;
        }
        .streak-banner {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        .mood-reactions { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .mood-btn {
            padding: 15px;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .mood-btn:hover { transform: scale(1.2); }
        .share-section {
            text-align: center;
            margin: 20px 0;
        }
        .share-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        .achievements {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .achievement {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #eee;
        }
        .achievement.unlocked {
            border-color: var(--primary);
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 5px var(--primary); }
            to { box-shadow: 0 0 20px var(--primary); }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="streak-banner">
            <h2>🔥 7 Day Streak!</h2>
            <p>Share your streak to unlock exclusive themes!</p>
        </div>
        
        <div class="mood-card">
            <h3>How are you feeling right now?</h3>
            <div class="mood-reactions">
                <button class="mood-btn" onclick="recordMood('😄')">😄</button>
                <button class="mood-btn" onclick="recordMood('😊')">😊</button>
                <button class="mood-btn" onclick="recordMood('😐')">😐</button>
                <button class="mood-btn" onclick="recordMood('😔')">😔</button>
                <button class="mood-btn" onclick="recordMood('😢')">😢</button>
            </div>
        </div>

        <div class="achievements">
            <div class="achievement unlocked">
                <h4>🌟 First Step</h4>
                <p>Started your mood journey</p>
            </div>
            <div class="achievement">
                <h4>🎯 Week Master</h4>
                <p>7 day streak</p>
            </div>
            <div class="achievement">
                <h4>🌈 Mood Warrior</h4>
                <p>Share 5 times</p>
            </div>
        </div>

        <div class="share-section">
            <button class="share-btn" onclick="shareJourney()">📱 Share My Mood Journey</button>
        </div>
    </div>

    <script>
        let streak = 7;
        let lastMood = null;

        function recordMood(mood) {
            lastMood = mood;
            const moodCard = document.createElement('div');
            moodCard.className = 'mood-card';
            moodCard.innerHTML = `
                <h3>Mood recorded! ${mood}</h3>
                <p>Others feeling the same way: ${Math.floor(Math.random() * 1000) + 100} people</p>
                <div class="share-section">
                    <button class="share-btn" onclick="shareSpecificMood('${mood}')">Share this mood</button>
                </div>
            `;
            document.querySelector('.container').insertBefore(moodCard, document.querySelector('.achievements'));
            updateStreak();
        }

        function updateStreak() {
            if (Math.random() > 0.5) {
                const achievement = document.createElement('div');
                achievement.className = 'mood-card';
                achievement.innerHTML = `
                    <h3>🎉 Achievement Unlocked!</h3>
                    <p>You've made progress on your mood journey!</p>
                `;
                document.querySelector('.container').insertBefore(achievement, document.querySelector('.achievements'));
            }
        }

        function shareJourney() {
            alert('Share your mood journey with friends to earn exclusive themes and achievements! 🌟');
        }

        function shareSpecificMood(mood) {
            alert(`Share how you're feeling ${mood} with friends! The more you share, the more rewards you unlock! 🎁`);
        }

        // Gamification features
        setInterval(() => {
            const randomMessages = [
                '👋 Friends are sharing their moods now!',
                '🎯 You're close to unlocking a new achievement!',
                '✨ Special theme available for next 2 hours!'
            ];
            const notification = document.createElement('div');
            notification.className = 'mood-card';
            notification.innerHTML = `<p>${randomMessages[Math.floor(Math.random() * randomMessages.length)]}</p>`;
            document.querySelector('.container').insertBefore(notification, document.querySelector('.mood-card'));
            setTimeout(() => notification.remove(), 3000);
        }, 15000);
    </script>
</body>
</html>
