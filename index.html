<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTune - Track Your Music & Mood</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }
        .mood-slider {
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            margin: 2rem 0;
        }
        .emoji-strip {
            display: flex;
            justify-content: space-between;
            font-size: 2rem;
            margin: 1rem 0;
        }
        input[type="range"] {
            width: 100%;
            height: 15px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }
        .song-input {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.5rem;
            border: none;
            border-radius: 0.25rem;
            background: rgba(255,255,255,0.9);
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .history {
            margin-top: 2rem;
        }
        .entry {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 0.5rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MoodTune</h1>
        <div class="mood-slider">
            <h2>How are you feeling?</h2>
            <div class="emoji-strip">
                <span>😢</span>
                <span>😕</span>
                <span>😐</span>
                <span>🙂</span>
                <span>😄</span>
            </div>
            <input type="range" min="1" max="5" value="3" id="moodSlider">
        </div>
        <div class="song-input">
            <h2>What are you listening to?</h2>
            <input type="text" id="songInput" placeholder="Enter song name and artist...">
        </div>
        <button onclick="saveMoodAndSong()">Save Entry</button>
        <div class="history" id="history"></div>
    </div>
    <script>
        const moodEmojis = ['😢', '😕', '😐', '🙂', '😄'];
        
        function saveMoodAndSong() {
            const mood = document.getElementById('moodSlider').value;
            const song = document.getElementById('songInput').value;
            
            if (!song) {
                alert('Please enter a song!');
                return;
            }
            
            const entry = document.createElement('div');
            entry.className = 'entry';
            entry.innerHTML = `
                <div>
                    <strong>${moodEmojis[mood-1]}</strong> 
                    ${song}
                </div>
                <small>${new Date().toLocaleTimeString()}</small>
            `;
            
            const history = document.getElementById('history');
            history.insertBefore(entry, history.firstChild);
            
            // Clear input
            document.getElementById('songInput').value = '';
            
            // Animation
            entry.style.opacity = '0';
            entry.style.transform = 'translateY(-20px)';
            setTimeout(() => {
                entry.style.transition = 'all 0.3s ease';
                entry.style.opacity = '1';
                entry.style.transform = 'translateY(0)';
            }, 50);
        }
    </script>
</body>
</html>
